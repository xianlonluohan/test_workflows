name: "Markdown to PDF Converter with Tiled Watermark"

on:
  push:
    branches: ["main", "v*"]
    tags: ["*"]
  pull_request:
    branches: ["main", "v*"]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  convert-md-to-pdf:
    runs-on: ubuntu-latest

    steps:
      - name: "Checkout repository"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "Install dependencies"
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pandoc \
            texlive-xetex \
            texlive-latex-extra \
            texlive-fonts-recommended \
            texlive-latex-recommended \
            texlive-lang-chinese \
            fonts-noto-cjk \
            fonts-noto-cjk-extra \
            fonts-wqy-microhei \
            fonts-wqy-zenhei \
            lmodern \
            tree \
            jq \
            python3-pip \
            fonts-dejavu \
            fonts-dejavu-extra

          pip3 install beautifulsoup4 markdown-it-py pygments

      - name: "Clean HTML to Markdown converter with fixed link handling"
        run: |
          cat > convert_html_clean.py << 'EOF'
          import os
          import re
          import sys

          # ---------- 代码块保护 ----------
          def protect_code_blocks(content):
              """保护代码块，返回占位符和代码块列表"""
              code_blocks = []
              # 匹配 ```language\n...\n``` 格式
              code_pattern = re.compile(r'```[^\n]*\n.*?\n```', re.DOTALL)
              
              def replace_code_block(match):
                  code_blocks.append(match.group(0))
                  return f"@@@CODE_BLOCK_{len(code_blocks)-1}@@@"
              
              protected = code_pattern.sub(replace_code_block, content)
              return protected, code_blocks

          def restore_code_blocks(content, code_blocks):
              for i, code in enumerate(code_blocks):
                  content = content.replace(f"@@@CODE_BLOCK_{i}@@@", code)
              return content

          # ---------- 其他处理函数（图片、链接等），均避免触碰代码块占位符 ----------
          def process_images_in_content(content):
              lines = content.split('\n')
              processed_lines = []
              in_table = False
              for line in lines:
                  if line.strip().startswith('|') and '|' in line[1:]:
                      in_table = True
                      processed_lines.append(line)
                  elif line.strip() == '':
                      in_table = False
                      processed_lines.append(line)
                  elif in_table:
                      processed_lines.append(line)
                  else:
                      # 只处理非表格行，且忽略占位符行
                      if not line.startswith('@@@CODE_BLOCK_'):
                          processed_line = process_non_table_images(line)
                          processed_lines.append(processed_line)
                      else:
                          processed_lines.append(line)
              return '\n'.join(processed_lines)

          def process_non_table_images(line):
              # 处理 <img> 标签
              img_pattern = re.compile(r'<img\s+([^>]+)>', re.IGNORECASE)
              def replace_img_tag(match):
                  attrs_str = match.group(1)
                  src_match = re.search(r'src\s*=\s*["\']([^"\']+)["\']', attrs_str)
                  alt_match = re.search(r'alt\s*=\s*["\']([^"\']*)["\']', attrs_str)
                  src = src_match.group(1) if src_match else ''
                  alt = alt_match.group(1) if alt_match else ''
                  if src:
                      src = re.sub(r'^\./', '', src)
                      src = re.sub(r'^/', '', src)
                  return f'\n![{alt}]({src})\n'
              line = img_pattern.sub(replace_img_tag, line)
              
              # 确保图片独占一行
              md_img_pattern = re.compile(r'!\[([^\]]*)\]\(([^)]+)\)')
              line = md_img_pattern.sub(lambda m: f'\n![{m.group(1)}]({m.group(2)})\n', line)
              # 移除 width 属性
              line = re.sub(r'\s*\{width=[^}]+\}', '', line)
              return line

          def remove_image_labels_and_figures(content):
              lines = content.split('\n')
              processed_lines = []
              i = 0
              while i < len(lines):
                  line = lines[i]
                  stripped = line.strip()
                  # 跳过图片下方的文字标签
                  if re.search(r'!\[.*\]\(.*\)', line):
                      processed_lines.append(line)
                      i += 1
                      for lookahead in range(min(3, len(lines)-i)):
                          next_line = lines[i+lookahead].strip()
                          if re.match(r'^(图\d*[:：]\s*.*|图片\d*[:：]\s*.*|图\s*\d+\s*[:：]\s*.*)$', next_line):
                              i += 1
                          else:
                              break
                      continue
                  if re.match(r'^(图\d*[:：]\s*.*|图片\d*[:：]\s*.*|图\s*\d+\s*[:：]\s*.*)$', stripped):
                      i += 1
                      continue
                  if stripped.startswith('|') and '|' in stripped[1:]:
                      processed_lines.append(line)
                      i += 1
                      continue
                  if re.match(r'^<center>图\d*[:：].*</center>$', stripped, re.IGNORECASE):
                      i += 1
                      continue
                  cleaned = re.sub(r'</?center>', '', line, flags=re.IGNORECASE)
                  processed_lines.append(cleaned)
                  i += 1
              return '\n'.join(processed_lines)

          def fix_tilde_in_text(content):
              # 仅处理非代码块内容，我们通过占位符避免触碰
              # 由于我们已经保护了代码块，这里直接处理普通文本
              return re.sub(r'(?<=\d)~(?=\d)', r'-', content)

          def preserve_markdown_links(content):
              # 处理 HTML 链接和裸链接
              # 先保护代码块占位符，避免误匹配
              # 简单起见，只做常规转换，不破坏占位符
              html_link_pattern = re.compile(r'<a\s+([^>]+)>(.*?)</a>', re.IGNORECASE | re.DOTALL)
              def replace_html_link(match):
                  attrs = match.group(1)
                  text = match.group(2).strip()
                  href_match = re.search(r'href\s*=\s*["\']([^"\']+)["\']', attrs)
                  if href_match:
                      href = href_match.group(1)
                      if not href.startswith(('http://', 'https://', 'mailto:')):
                          href = re.sub(r'^\./', '', href)
                          href = re.sub(r'^/', '', href)
                      return f'[{text}]({href})'
                  return text
              content = html_link_pattern.sub(replace_html_link, content)
              # 处理 <https://...> 形式的链接
              content = re.sub(r'<(https?://[^>]+)>', r'[\1](\1)', content)
              return content

          def fix_special_characters(content):
              content = re.sub(r'（0,100）', '（0-100）', content)
              content = re.sub(r'（0\.100）', '（0-100）', content)
              content = re.sub(r'(\d):(\d)', r'\1-\2', content)
              content = re.sub(r'（(\d+)[.,](\d{2,3})）', r'（\1-\2）', content)
              return content

          def fix_text_code_blocks(content):
              # 专门处理 ```text 代码块，保证其内容不换行（可选）
              # 这里简单替换，不影响占位符
              return content

          def process_markdown_file(filepath):
              try:
                  with open(filepath, 'r', encoding='utf-8', errors='ignore') as f:
                      content = f.read()

                  # 1. 先保护所有代码块
                  content, code_blocks = protect_code_blocks(content)

                  # 2. 其他全局处理（此时代码块已被占位符替代，不会受影响）
                  content = fix_special_characters(content)
                  content = fix_text_code_blocks(content)
                  content = preserve_markdown_links(content)
                  content = process_images_in_content(content)
                  content = remove_image_labels_and_figures(content)
                  content = fix_tilde_in_text(content)

                  # 3. 移除不安全的 HTML 标签（保留白名单）
                  content = re.sub(r'<(?!@@@CODE_BLOCK_)(?!\/?code>)(?!\/?pre>)(?!\/?span>)(?!\/?div>)(?!\/?p>)(?!\/?br>)[^>]+>', '', content)

                  # 4. 恢复代码块
                  content = restore_code_blocks(content, code_blocks)

                  with open(filepath, 'w', encoding='utf-8') as f:
                      f.write(content)
                  return True
              except Exception as e:
                  print(f"Error processing {filepath}: {e}")
                  return False

          processed = 0
          for root, dirs, files in os.walk('.'):
              skip_dirs = ['.git', 'pdf_output', '__pycache__', '.github', 'node_modules', 'output']
              dirs[:] = [d for d in dirs if d not in skip_dirs]
              for file in files:
                  if file.endswith('.md'):
                      filepath = os.path.join(root, file)
                      if process_markdown_file(filepath):
                          processed += 1
          EOF

          python3 convert_html_clean.py

      - name: "Create LaTeX template"
        run: |
          cat > header.tex << 'EOF'
          \usepackage{xeCJK}
          \usepackage[UTF8]{ctex}
          % 英文字体
          \setmainfont{DejaVu Serif}
          \setsansfont{DejaVu Sans}
          \setmonofont{DejaVu Sans Mono}
          % 中文字体
          \setCJKmainfont{Noto Serif CJK SC}
          \setCJKsansfont{Noto Sans CJK SC}
          \setCJKmonofont{Noto Sans Mono CJK SC}

          \usepackage[margin=2.0cm]{geometry}

          \usepackage{hyperref}
          \hypersetup{
            colorlinks=true,
            linkcolor={rgb}{0.13,0.4,0.84},
            urlcolor={rgb}{0.13,0.4,0.84},
            citecolor={rgb}{0.13,0.4,0.84},
          }

          \usepackage{minted}
          \usepackage{xcolor}
          \definecolor{codebg}{rgb}{0.98,0.98,0.98}
          \usemintedstyle{github}
          \setminted{
            breaklines=true,
            breakautoindent=true,
            tabsize=2,
            frame=single,
            framesep=5pt,
            framerule=1pt,
            rulecolor=lightgray,
            bgcolor=codebg,
            xleftmargin=15pt,
            xrightmargin=15pt,
            % 取消行号
          }

          \usepackage{graphicx}
          \usepackage{float}
          \usepackage{placeins}
          \usepackage{mdframed}
          \usepackage{xspace}

          \usepackage{caption}
          \captionsetup[figure]{labelformat=empty, textformat=empty}
          \usepackage{subcaption}
          \captionsetup[subfigure]{labelformat=empty, textformat=empty}

          \definecolor{framecolor}{rgb}{0.8,0.8,0.8}
          \definecolor{quotebg}{rgb}{0.97,0.97,0.97}
          \definecolor{quoteframe}{rgb}{0.85,0.85,0.85}

          \newmdenv[
            backgroundcolor=quotebg,
            linecolor=quoteframe,
            linewidth=1pt,
            roundcorner=5pt,
            innerleftmargin=12pt,
            innerrightmargin=12pt,
            innertopmargin=8pt,
            innerbottommargin=8pt,
            skipabove=6pt,
            skipbelow=6pt,
          ]{quotebox}

          \usepackage{float}
          \floatplacement{figure}{H}

          \usepackage{booktabs}
          \newcommand{\HRule}{\rule{\linewidth}{0.5mm}}

          \usepackage{parskip}
          \setlength{\parindent}{0pt}
          \setlength{\parskip}{0.8em}

          \sloppy
          \emergencystretch=3em

          % 标题样式：无加粗
          \usepackage{titlesec}
          \titleformat{\section}
            {\Large\sffamily}{\thesection}{1em}{}
          \titlespacing*{\section}{0pt}{2ex}{1ex}
          \titleformat{\subsection}
            {\large\sffamily}{\thesubsection}{1em}{}
          \titlespacing*{\subsection}{0pt}{1.5ex}{0.8ex}
          \titleformat{\subsubsection}
            {\normalsize\sffamily}{\thesubsubsection}{1em}{}
          \titlespacing*{\subsubsection}{0pt}{1ex}{0.5ex}

          \renewcommand{\thesection}{\arabic{section}}
          \renewcommand{\thesubsection}{\thesection.\arabic{subsection}}
          \renewcommand{\thesubsubsection}{\thesubsection.\arabic{subsubsection}}

          % 水印
          \usepackage{eso-pic}
          \usepackage{tikz}
          \usetikzlibrary{calc}
          \newcommand\BackgroundPicture{%
            \begin{tikzpicture}[remember picture,overlay]
              \coordinate (page center) at (current page.center);
              \pgfmathsetmacro{\pagewidth}{\paperwidth}
              \pgfmathsetmacro{\pageheight}{\paperheight}
              \pgfmathsetmacro{\hcount}{3}
              \pgfmathsetmacro{\vcount}{4}
              \pgfmathsetmacro{\hspace}{\paperwidth/(\hcount+1)}
              \pgfmathsetmacro{\vspace}{\paperheight/(\vcount+1)}
              \foreach \i in {1,...,\hcount} {
                \foreach \j in {1,...,\vcount} {
                  \pgfmathsetmacro{\x}{-\paperwidth/2 + \i*\hspace}
                  \pgfmathsetmacro{\y}{-\paperheight/2 + \j*\vspace}
                  \node at ($(page center) + (\x pt, \y pt)$) [
                    rotate=45,
                    scale=1.5,
                    text=gray!30,
                    opacity=0.45,
                    font=\sffamily\bfseries\large
                  ] {emakefun};
                }
              }
            \end{tikzpicture}%
          }
          \AddToShipoutPictureBG{\BackgroundPicture}

          \graphicspath{{./}{./resource/}}

          \makeatletter
          \def\maxwidth{\ifdim\Gin@nat@width>\linewidth\linewidth\else\Gin@nat@width\fi}
          \makeatother
          \let\oldincludegraphics\includegraphics
          \renewcommand{\includegraphics}[2][]{%
            \begingroup
            \centering
            \oldincludegraphics[#1,width=\maxwidth]{#2}%
            \endgroup
          }

          \usepackage{titletoc}
          \setcounter{tocdepth}{-1}

          \usepackage{fvextra}
          \usepackage{csquotes}
          \newcommand{\quoteblock}[1]{%
            \begin{quotebox}
            #1
            \end{quotebox}
          }
          EOF

      - name: "Create Pandoc filter"
        run: |
          cat > quote-filter.lua << 'EOF'
          function Block(el)
            if el.t == "BlockQuote" then
              local content = ""
              for i, item in ipairs(el.content) do
                content = content .. pandoc.write(pandoc.Pandoc({item}), "latex")
              end
              return pandoc.RawBlock('latex', '\\begin{quotebox}\n' .. content .. '\\end{quotebox}')
            end
            if el.t == "HorizontalRule" then
              return pandoc.RawBlock('latex', '\\vspace{0.5em}\\HRule\\vspace{0.5em}')
            end
            return el
          end

          function CodeBlock(el)
            -- 普通代码块由 minted 自动处理，我们只需确保 text 语言也被正确识别
            if el.classes[1] == "text" then
              return pandoc.RawBlock('latex',
                '\\begin{minted}[style=github]{text}\n' ..
                el.text ..
                '\n\\end{minted}')
            end
            return el
          end

          function Str(el)
            local text = el.text
            text = text:gsub('（0,100）', '（0-100）')
            text = text:gsub('（0%.100）', '（0-100）')
            text = text:gsub('（(%d+)[.,](%d%d%d）', '（%1-%2）')
            return pandoc.Str(text)
          end

          function Image(el)
            el.caption = {}
            return el
          end

          -- 简单处理 HTML 标签
          function RawInline(el)
            if el.format == "html" then
              local text = el.text
              text = text:gsub('<br%s*/?>', '\\newline')
              text = text:gsub('<span%s+style="color:%s*([^"]+)"%s*>(.-)</span>',
                function(color, content)
                  return '\\textcolor{' .. color .. '}{' .. content .. '}'
                end)
              text = text:gsub('<div[^>]*>(.-)</div>', '\\begin{minipage}{\\linewidth}%1\\end{minipage}')
              if text ~= el.text then
                return pandoc.RawInline('latex', text)
              end
            end
            return el
          end

          function RawBlock(el)
            if el.format == "html" then
              local text = el.text
              text = text:gsub('<br%s*/?>', '\\newline')
              text = text:gsub('<div[^>]*>(.-)</div>', '\\begin{minipage}{\\linewidth}%1\\end{minipage}')
              if text ~= el.text then
                return pandoc.RawBlock('latex', text)
              end
            end
            return el
          end
          EOF

      - name: "Convert Markdown to PDF"
        run: |
          MD_FILES=$(find . -name "*.md" -not -path "./.*" -not -path "*/node_modules/*" -not -path "./output/*" | sed 's/^\.\///')

          IFS=$'\n'
          converted_count=0
          failed_count=0

          CURRENT_DATE=$(date '+%Y-%m-%d')

          for md_file in $MD_FILES; do
            [ -z "$md_file" ] && continue

            dir_name=$(dirname "$md_file")
            base_name=$(basename "$md_file" .md)

            if [ "$dir_name" != "." ]; then
              mkdir -p "$dir_name"
            fi

            md_dir=$(dirname "$md_file")
            resource_paths="$md_dir:$md_dir/../resource:.:./resource"

            set +e

            pandoc "$md_file" \
              --resource-path="$resource_paths" \
              -o "$dir_name/$base_name.pdf" \
              --pdf-engine=xelatex \
              --include-in-header=header.tex \
              --lua-filter=quote-filter.lua \
              -V mainfont="Noto Serif CJK SC" \
              -V sansfont="Noto Sans CJK SC" \
              -V monofont="Noto Sans Mono CJK SC" \
              -V geometry:margin=2.0cm \
              -V geometry:a4paper \
              -V colorlinks=true \
              -V graphics \
              -V minted \
              --pdf-engine-opt=-shell-escape \
              --wrap=auto \
              -f markdown+raw_html \
              -M date="$CURRENT_DATE" \
              2>&1 >/dev/null

            conversion_status=$?

            set -e

            if [ $conversion_status -eq 0 ] && [ -f "$dir_name/$base_name.pdf" ] && [ -s "$dir_name/$base_name.pdf" ]; then
              converted_count=$((converted_count + 1))
            else
              failed_count=$((failed_count + 1))
            fi
          done

          if [ $converted_count -eq 0 ] && [ $failed_count -gt 0 ]; then
            exit 1
          fi

      - name: "Copy resource directories"
        run: |
          pdf_dirs=$(find . -name "*.pdf" -type f -not -path "./.*" -not -path "*/node_modules/*" -not -path "*/resource/*" | xargs -I {} dirname {} | sort -u)

          for pdf_dir in $pdf_dirs; do
            if [ -d "$pdf_dir/resource" ]; then
              continue
            fi

            if [ -d "./resource" ] && [ "$pdf_dir" != "." ]; then
              if command -v rsync >/dev/null 2>&1; then
                rsync -av --exclude='resource/' ./resource/ "$pdf_dir/resource/" >/dev/null 2>&1 || true
              else
                mkdir -p "$pdf_dir/resource"
                find "./resource" -type f -exec cp --parents {} "$pdf_dir/" 2>/dev/null \; || true
              fi
            fi

            parent_dir=$(dirname "$pdf_dir")
            if [ -d "$parent_dir/resource" ] && [ "$parent_dir" != "." ]; then
              if command -v rsync >/dev/null 2>&1; then
                rsync -av --exclude='resource/' "$parent_dir/resource/" "$pdf_dir/resource/" >/dev/null 2>&1 || true
              else
                mkdir -p "$pdf_dir/resource"
                find "$parent_dir/resource" -type f -exec cp --parents {} "$pdf_dir/" 2>/dev/null \; || true
              fi
            fi

            if [ -d "$pdf_dir/resource/resource" ]; then
              rm -rf "$pdf_dir/resource/resource"
            fi
          done

      - name: "Verify PDF files"
        run: |
          total_pdfs=$(find . -name "*.pdf" -type f -not -path "./.*" -not -path "*/node_modules/*" 2>/dev/null | wc -l)

          if [ $total_pdfs -eq 0 ]; then
            exit 1
          fi

      - name: "Create zip archive for release"
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          REPO_NAME=$(basename $GITHUB_REPOSITORY)

          mkdir -p pdf_collection

          PDF_FILES=$(find . -name "*.pdf" -type f \
            -not -path "./.*" \
            -not -path "*/node_modules/*" \
            -not -path "./pdf_collection/*" \
            -not -path "*/resource/*" | sed 's/^\.\///')

          echo "$PDF_FILES" | while read pdf_file; do
            [ -z "$pdf_file" ] && continue

            dir_name=$(dirname "$pdf_file")
            base_name=$(basename "$pdf_file" .pdf)

            mkdir -p "pdf_collection/$dir_name"

            cp "$pdf_file" "pdf_collection/$pdf_file"

            if [ -d "$dir_name/resource" ]; then
              mkdir -p "pdf_collection/$dir_name/resource"
              find "$dir_name/resource" -type f \
                -exec cp --parents {} "pdf_collection/" \; 2>/dev/null || true
            fi

            current_dir="$dir_name"
            for i in 1 2 3; do
              parent_dir=$(dirname "$current_dir")
              if [ "$parent_dir" = "." ]; then
                if [ -d "./resource" ]; then
                  mkdir -p "pdf_collection/$dir_name/resource"
                  find "./resource" -type f \
                    -exec cp --parents {} "pdf_collection/$dir_name/" \; 2>/dev/null || true
                fi
                break
              elif [ -d "$parent_dir/resource" ]; then
                mkdir -p "pdf_collection/$dir_name/resource"
                find "$parent_dir/resource" -type f \
                  -exec cp --parents {} "pdf_collection/$dir_name/" \; 2>/dev/null || true
                break
              fi
              current_dir="$parent_dir"
            done

            if [ -d "./resource" ]; then
              if [ ! -d "pdf_collection/resource" ]; then
                mkdir -p "pdf_collection/resource"
                find "./resource" -type f \
                  -exec cp {} "pdf_collection/resource/" \; 2>/dev/null || true
              fi
            fi
          done

          cd pdf_collection
          zip -r "../${REPO_NAME}-${TAG_NAME}.zip" . >/dev/null
          cd ..

          rm -rf pdf_collection

      - name: "Upload PDF artifacts"
        uses: actions/upload-artifact@v4
        with:
          name: pdf-documents
          path: |
            **/*.pdf
            **/resource/
          retention-days: 7

      - name: "Create GitHub Release"
        if: startsWith(github.ref, 'refs/tags/')
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: "${{ github.ref_name }}"
          files: |
            ${{ env.REPO_NAME }}-${{ github.ref_name }}.zip
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          REPO_NAME: ${{ github.event.repository.name }}